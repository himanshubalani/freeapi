<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeAPI Playground</title>
    <!-- Your standard Meta Tags/Icons remain unchanged -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h2 class="sidebar-logo">FreeAPI<br><span style="color:var(--text-secondary)">Playground</span></h2>
            <ul class="nav-list" id="nav-list">
                <!-- Injected via Router -->
            </ul>
            
            <div class="sidebar-footer">
                made by <a href="https://www.himanshubalani.com" target="_blank">himanshubalani.com</a>
            </div>
        </aside>

        <!-- MAIN VIEW -->
        <div class="main-wrapper">
            <header class="page-header">
                <h1 class="page-title" id="current-page-title">FreeAPI_</h1>
                <div id="status-badge" class="badge hidden">Status</div>
            </header>

            <!-- DYNAMIC COMPONENT INJECTED HERE -->
            <div id="app-root"></div>
        </div>
        
    </div>

    <!-- Specify type="module" so we can use imports! -->
    <script type="module" src="app.js"></script>
</body>
</html>
